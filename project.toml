[build-system]
requires = ["setuptools>=65.0.0", "wheel>=0.37.0"]
build-backend = "setuptools.build_meta"

[project]
name = "data-gen"
version = "0.1.0"
description = "Unified synthetic data generation for tabular, time-series, image, and text data"
authors = [
  { name = "Fahad Abdullah", email = "fahadai.co@gmail.com" }
]
license = { file = "LICENSE" }
readme = "README.md"
requires-python = ">=3.8"
keywords = ["synthetic-data", "GAN", "privacy", "data-generation", "text-generation", "AI"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.8",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent"
]

[tool.black]
line-length = 88
