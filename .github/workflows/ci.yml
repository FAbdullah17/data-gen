name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build & Test (Python >=3.10)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the package itself with all optional dependencies including dev
        pip install -e .[all]

    - name: Run linting and formatting checks (pre-commit)
      # pre-commit executes ruff, mypy, and other hooks defined in .pre-commit-config.yaml
      run: |
        pre-commit run --all-files

    - name: Run unit and integration tests
      run: |
        pytest tests/ --cov=src/syntharc --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
